<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guestbook</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }
        .container { max-width: 640px; margin: 40px auto; padding: 0 20px; }
        h1 { font-size: 2rem; margin-bottom: 8px; }
        .version-bar { background: #1a1a2e; color: #a0aec0; padding: 10px 14px; border-radius: 8px; font-size: 12px; margin-bottom: 28px; display: flex; gap: 20px; flex-wrap: wrap; }
        .version-bar span { color: #fff; font-weight: 600; }
        .card { background: #fff; border-radius: 10px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
        .message p { line-height: 1.6; }
        .message time { font-size: 12px; color: #999; margin-top: 6px; display: block; }
        textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; resize: vertical; min-height: 80px; font-family: inherit; }
        textarea:focus { outline: none; border-color: #667eea; }
        button { margin-top: 10px; padding: 10px 24px; background: #667eea; color: #fff; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
        button:hover { background: #5a6fd6; }
        button:disabled { background: #a0aec0; cursor: not-allowed; }
        .empty { color: #999; font-style: italic; }
        .error { color: #e53e3e; font-size: 13px; margin-top: 6px; }
        h2 { font-size: 1.1rem; margin-bottom: 14px; color: #555; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Guestbook</h1>

        <div class="version-bar">
            <div>Frontend: <span id="front-version">—</span></div>
            <div>Backend: <span id="back-version">loading…</span></div>
            <div>Instance: <span id="instance-id">loading…</span></div>
        </div>

        <div class="card">
            <h2>Leave a message</h2>
            <textarea id="message-text" placeholder="Write something…"></textarea>
            <br>
            <button id="send-btn" onclick="sendMessage()">Send</button>
            <div id="send-error" class="error"></div>
        </div>

        <h2>Messages</h2>
        <div id="messages"><p class="empty">Loading…</p></div>
    </div>

    <script src="version.js"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
